# Release Pipeline - Builds Electron app and creates GitHub releases
# Triggers:
#   - Push to main: Creates prerelease (dev-{short-sha})
#   - Push v* tag: Creates stable release (v1.0.0, etc.)

name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

# Don't cancel in-progress release builds
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  # Determine release type and version
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      release_name: ${{ steps.version.outputs.release_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "release_name=Release $VERSION" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            VERSION="dev-$SHORT_SHA"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "release_name=Development Build ($SHORT_SHA)" >> $GITHUB_OUTPUT
          fi

  # Build frontend static export
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static export
        working-directory: frontend
        run: npm run build
        env:
          # Uses RAILWAY_BACKEND_URL secret if set, otherwise falls back to localhost
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.RAILWAY_BACKEND_URL || 'http://localhost:8000' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-out
          path: frontend/out
          retention-days: 1

  # Build Electron for each platform
  build-electron:
    name: Build Electron (${{ matrix.os }})
    needs: [prepare, build-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-out
          path: frontend/out

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build Electron main process
        working-directory: electron
        run: npm run build

      - name: Install electron-builder
        working-directory: electron
        run: npm install --no-save electron-builder@24.13.3

      - name: Build Electron app
        working-directory: electron
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            mac)
              npx electron-builder --config electron-builder.yml --mac
              ;;
            linux)
              npx electron-builder --config electron-builder.yml --linux
              ;;
            win)
              npx electron-builder --config electron-builder.yml --win
              ;;
            *)
              echo "Unsupported platform: ${{ matrix.platform }}"
              exit 1
              ;;
          esac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.platform }}
          path: |
            electron/release/*.dmg
            electron/release/*.zip
            electron/release/*.exe
            electron/release/*.AppImage
            electron/release/*.deb
          retention-days: 5

  # Create GitHub release with all artifacts
  create-release:
    name: Create GitHub Release
    needs: [prepare, build-electron]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: electron-*
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f -name "*" | head -50

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ needs.prepare.outputs.release_name }}
          tag_name: ${{ needs.prepare.outputs.version }}
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: |
            artifacts/*
          body: |
            ## Portfolio Analysis Desktop App

            The release is marked as **pre-release** for `main` branch builds and **stable** for `v*` tag builds.

            ### Downloads
            - **macOS**: `.dmg` (Intel & Apple Silicon) or `.zip`
            - **Windows**: `.exe` installer
            - **Linux**: `.AppImage` or `.deb`

            ### Requirements
            - The backend must be running separately at `http://localhost:8000`
            - See the [README](https://github.com/${{ github.repository }}#quick-start) for backend setup instructions

            ### Notes
            - These builds are **unsigned**. You may see security warnings on first launch.
              - **macOS**: Right-click → Open, then click "Open" in the dialog
              - **Windows**: Click "More info" → "Run anyway"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
