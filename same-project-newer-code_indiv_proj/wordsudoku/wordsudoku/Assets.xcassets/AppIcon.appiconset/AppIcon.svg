<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCF9F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8F5EC;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bgGradient)"/>
  
  <!-- Grid container -->
  <g transform="translate(152, 152)" filter="url(#shadow)">
    <!-- Grid background -->
    <rect width="720" height="720" rx="32" ry="32" fill="#FFFFFE" stroke="#1A1A1F" stroke-width="4" stroke-opacity="0.12"/>
    
    <!-- Grid lines - vertical -->
    <line x1="240" y1="0" x2="240" y2="720" stroke="#1A1A1F" stroke-width="2" stroke-opacity="0.1"/>
    <line x1="480" y1="0" x2="480" y2="720" stroke="#1A1A1F" stroke-width="2" stroke-opacity="0.1"/>
    
    <!-- Grid lines - horizontal -->
    <line x1="0" y1="240" x2="720" y2="240" stroke="#1A1A1F" stroke-width="2" stroke-opacity="0.1"/>
    <line x1="0" y1="480" x2="720" y2="480" stroke="#1A1A1F" stroke-width="2" stroke-opacity="0.1"/>
    
    <!-- Letters - Row 1 -->
    <text x="120" y="160" font-family="Georgia, serif" font-size="140" font-weight="600" fill="#1A1A1F" text-anchor="middle" dominant-baseline="middle">W</text>
    <text x="360" y="160" font-family="Georgia, serif" font-size="140" font-weight="600" fill="#1A1A1F" text-anchor="middle" dominant-baseline="middle">O</text>
    <text x="600" y="160" font-family="Georgia, serif" font-size="140" font-weight="600" fill="#1A1A1F" text-anchor="middle" dominant-baseline="middle">R</text>
    
    <!-- Letters - Row 2 -->
    <text x="120" y="400" font-family="Georgia, serif" font-size="140" font-weight="600" fill="#1A1A1F" text-anchor="middle" dominant-baseline="middle">D</text>
    
    <!-- Highlighted center cell (yellow accent) -->
    <rect x="244" y="244" width="232" height="232" fill="#E0B833" fill-opacity="0.25" rx="8"/>
    <text x="360" y="400" font-family="Georgia, serif" font-size="140" font-weight="700" fill="#1947A6" text-anchor="middle" dominant-baseline="middle">O</text>
    
    <text x="600" y="400" font-family="Georgia, serif" font-size="140" font-weight="600" fill="#1A1A1F" text-anchor="middle" dominant-baseline="middle">K</text>
    
    <!-- Letters - Row 3 -->
    <text x="120" y="640" font-family="Georgia, serif" font-size="140" font-weight="600" fill="#1A1A1F" text-anchor="middle" dominant-baseline="middle">U</text>
    <text x="360" y="640" font-family="Georgia, serif" font-size="140" font-weight="600" fill="#1A1A1F" text-anchor="middle" dominant-baseline="middle">?</text>
    <text x="600" y="640" font-family="Georgia, serif" font-size="140" font-weight="600" fill="#1A1A1F" text-anchor="middle" dominant-baseline="middle">!</text>
  </g>
</svg>
